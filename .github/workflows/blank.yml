name: Generate Space Shooter Animation

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Generar exclusivamente la animación del Space Shooter
      - name: Generate Space Shooter Retro
        uses: mmgha/space-shooter-action@v1
        with:
          username: eli4shh
          output: dist/space-shooter.gif

      # Subir el gif a tu rama 'snake-output'
      - name: Push to production branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: snake-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
